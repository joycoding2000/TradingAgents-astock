# TradingAgents-Astock 反向代理配置（阿里云 ECS，复用宿主机 nginx）
#
# 部署步骤：
#   1. sudo cp nginx/tradingagents.conf /etc/nginx/conf.d/
#   2. 生成密码文件（把 用户名/密码 换成你自己的）：
#        sudo sh -c "echo 'trader:$(openssl passwd -apr1 你的密码)' > /etc/nginx/.htpasswd_tradingagents"
#   3. sudo nginx -t && sudo systemctl reload nginx
#   4. 阿里云安全组开放 8080 端口
#   5. 访问 http://<服务器公网IP>:8080
#
# 与现有 tja.conf(80) 互不干扰：不同 listen 端口，各自独立 server 块。

server {
    listen 8080;
    server_name _;

    # 访问认证由 Streamlit 应用内登录页处理（环境变量 ACCESS_TOKEN 控制），
    # nginx 层不做 Basic Auth，避免双重认证。务必在 .env 设置 ACCESS_TOKEN，
    # 否则 Web UI 将无认证暴露在公网。
    client_max_body_size 50m;

    location / {
        proxy_pass http://127.0.0.1:8501;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streamlit 依赖 WebSocket 推送实时分析进度，必须透传 Upgrade 头
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 86400;   # 长分析任务不中断
        proxy_buffering off;        # 流式输出实时显示
    }
}
